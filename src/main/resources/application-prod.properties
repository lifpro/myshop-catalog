spring.application.name=catalog-service
server.port=8081

###### Database #####
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/myshop_catalog?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=######
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

logging.level.com.myshop=ERROR

###### Constantes #####
myshop.catalog.page-size=20
myshop.catalog.default-currency=USD
myshop.catalog.promotions-enabled=false



